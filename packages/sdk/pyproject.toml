[tool.poetry]
name = "amini"
version = "0.1.0"
description = "Python SDK for Amini — compliance infrastructure for agentic AI"
authors = ["Amini Team"]
readme = "README.md"
packages = [{include = "amini", from = "src"}]

[tool.poetry.dependencies]
python = "^3.10"
httpx = "^0.27"
pydantic = "^2.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"
pytest-asyncio = "^0.23"
ruff = "^0.4"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py310"
line-length = 100
