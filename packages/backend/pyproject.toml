[tool.poetry]
name = "amini-server"
version = "0.1.0"
description = "Amini backend — compliance infrastructure for agentic AI"
authors = ["Amini Team"]
readme = "README.md"
packages = [{include = "amini_server", from = "src"}]

[tool.poetry.dependencies]
python = "^3.10"
fastapi = "^0.115"
uvicorn = {extras = ["standard"], version = "^0.34"}
sqlalchemy = {extras = ["asyncio"], version = "^2.0"}
aiosqlite = "^0.21"
asyncpg = "^0.30"
alembic = "^1.14"
pydantic-settings = "^2.0"
pyyaml = "^6.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"
pytest-asyncio = "^0.23"
httpx = "^0.27"
ruff = "^0.4"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py310"
line-length = 100
